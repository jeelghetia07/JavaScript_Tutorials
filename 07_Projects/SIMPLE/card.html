<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTING</title>
    <style>
        body{
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .card{
            width: 500px;
            background-color: white;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        .top-section{
            background: #cc741b;
            color: rgb(255, 255, 255);
            padding: 10px;
        }

        .profile img{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-top: 15px;
            border: 4px solid white;
        }

        .info{
            padding: 15px;
        }

        .info p{
            color: #555;
        }

        .search-box{
            position: absolute;
            top: 50px;
            text-align: center;
        }

        .search-box input{
            padding: 8px;
            width: 200px;
        }

        .search-box button{
            padding: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="search-box">
        <input type="text" id = "input-user" placeholder="Enter your Username here.">
        <button onclick="getData()">Search</button>
    </div>
    <div class="card">
        <div class="top-section">
            <h2>Student ID</h2>
        </div>
        <div class="profile">
            <img id="profile-img" src="" alt="Profile Image" >
        </div>

        <div class="info">
            <h3 id="name">Name : </h3>
            <p id = "username">@username : </p>
            <p id = "followers">Followers : </p>
        </div>
    </div>
</body>
<script>
    function getData(){
        const username = document.getElementById("input-user").value;

        const xhr = new XMLHttpRequest();

        const requestUrl = 'https://api.github.com/users/' + username;
        xhr.open('GET', requestUrl);
    
        xhr.onreadystatechange = function(){
            let stage = xhr.readyState;
            console.log(stage);
            if(stage === 4 && xhr.status === 200){
                const data = JSON.parse(xhr.responseText);
                
                document.querySelector('#name').innerText = data.name;
                document.getElementById('username').innerHTML = "@" + data.login;
                document.querySelector('#followers').innerHTML = data.followers;
                document.getElementById("profile-img").src = data.avatar_url;
            }
        };
    
        xhr.send();
    }
</script>
</html>
